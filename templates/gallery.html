{% extends "base.html" %}
{% block title %}Gallery | {{ settings.site_title }}{% endblock %}
{% block content %}

<section class="page-header">
  <p class="breadcrumb"><a href="{{ url_for('index') }}">Home</a> / Gallery</p>
  <h1>Our Work</h1>
</section>

{% if images %}
<section class="catalogue-section">
  <div class="gallery-grid">
    {% for img in images %}
    <figure class="gallery-item">
      <img src="{{ url_for('static', filename=img.image_path) }}" alt="{{ img.title or 'Completed work' }}" loading="lazy">
      {% if img.title or img.category_name %}
      <figcaption>
        {% if img.title %}<span class="gallery-title">{{ img.title }}</span>{% endif %}
        {% if img.category_name %}<span class="gallery-cat">{{ img.category_name }}</span>{% endif %}
      </figcaption>
      {% endif %}
    </figure>
    {% endfor %}
  </div>
</section>
{% else %}
<section class="empty-state">
  <p>No gallery images yet. Check back soon to see our completed work.</p>
</section>
{% endif %}

{% endblock %}
