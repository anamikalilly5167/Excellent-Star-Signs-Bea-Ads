<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login | Excellent Star Signs</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="login-body">
  <form class="login-box" id="loginForm">
    <div class="admin-logo admin-logo--center"><img src="{{ url_for('static', filename=logo_path) }}" alt="Excellent Star Signs & Bea Ads"></div>
    <h2>Staff Access</h2>
    <p class="login-error" id="loginError" style="display:none"></p>
    <label>Email<input type="email" name="email" required autofocus></label>
    <label>Password<input type="password" name="password" required></label>
    <button type="submit">Log In</button>
  </form>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var errorBox = document.getElementById("loginError");
      fetch("{{ url_for('admin_login') }}", { method: "POST", body: new FormData(this), cache: "no-store" })
        .then(function (r) { return r.json().then(function (data) { return { status: r.status, data: data }; }); })
        .then(function (res) {
          if (res.data.ok) {
            location.replace(res.data.redirect);
          } else {
            errorBox.textContent = res.data.error;
            errorBox.style.display = "block";
          }
        })
        .catch(function () {
          errorBox.textContent = "Something went wrong. Please try again.";
          errorBox.style.display = "block";
        });
    });
  </script>
</body>
</html>
