{% extends "admin/base.html" %}
{% block heading %}My Account{% endblock %}
{% block content %}

<div class="panel">
  <div class="panel-header"><h2>Super Admin Credentials</h2></div>
  <p class="panel-note">Leave password blank to keep your current password and only change the email.</p>
  <form method="post" class="settings-form">
    <label>Email<input type="email" name="email" value="{{ me.email }}" required></label>
    <label>New Password<input type="password" name="password" placeholder="Leave blank to keep current" minlength="6"></label>
    <button type="submit" class="btn-primary">Save Changes</button>
  </form>
</div>

{% endblock %}
