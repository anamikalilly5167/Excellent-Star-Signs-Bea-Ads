{% extends "admin/base.html" %}
{% block heading %}Settings{% endblock %}
{% block content %}

<div class="panel">
  <div class="panel-header"><h2>Contact &amp; Site Information</h2></div>
  <form method="post" class="settings-form">
    <label>Phone 1<input type="text" name="phone_1" value="{{ settings.phone_1 }}"></label>
    <label>Phone 2<input type="text" name="phone_2" value="{{ settings.phone_2 }}"></label>
    <label>Landline<input type="text" name="landline" value="{{ settings.landline }}"></label>
    <label>Email<input type="text" name="email" value="{{ settings.email }}"></label>
    <label>Address<input type="text" name="address" value="{{ settings.address }}"></label>
    <label>WhatsApp Link<input type="text" name="whatsapp" value="{{ settings.whatsapp }}"></label>
    <label>Instagram Link<input type="text" name="instagram" value="{{ settings.instagram }}"></label>
    <label>Facebook Link<input type="text" name="facebook" value="{{ settings.facebook }}"></label>
    <label>Site Title<input type="text" name="site_title" value="{{ settings.site_title }}"></label>
    <label>Tagline<input type="text" name="tagline" value="{{ settings.tagline }}"></label>
    <label>Google Maps Embed URL<input type="text" name="map_embed_url" value="{{ settings.map_embed_url }}" placeholder="https://www.google.com/maps/embed?..."></label>
    <label class="full-width">Business Hours<textarea name="business_hours" rows="3">{{ settings.business_hours }}</textarea></label>
    <button type="submit" class="btn-primary">Save Settings</button>
  </form>
</div>

{% endblock %}
